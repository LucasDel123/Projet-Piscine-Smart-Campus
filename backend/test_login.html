<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test connexion — SmartCampus</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 420px;
      margin: 60px auto;
      padding: 0 20px;
      color: #1a1a2e;
    }
    h1 { font-size: 1.3rem; }
    p.sub { color: #555; font-size: 0.9rem; margin-top: -8px; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    pre {
      margin-top: 20px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.85rem;
      min-height: 40px;
    }
    .ok { color: #4ade80; font-weight: 700; }
    .ko { color: #f87171; font-weight: 700; }
  </style>
</head>
<body>
  <h1>🔐 Test de connexion</h1>
  <p class="sub">Page de test temporaire de l'API SmartCampus</p>

  <label for="email">Email</label>
  <input type="email" id="email" value="lucas.delliste@edu.ece.fr">

  <label for="mdp">Mot de passe</label>
  <input type="password" id="mdp" value="mateolpb">

  <button id="btn">Se connecter</button>

  <pre id="resultat">Le résultat s'affichera ici…</pre>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const resultat = document.getElementById('resultat');
      resultat.textContent = 'Connexion en cours…';

      try {
        const reponse = await fetch('api/auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            mot_de_passe: document.getElementById('mdp').value
          })
        });

        const data = await reponse.json();

        const etat = data.success
          ? '<span class="ok">✅ SUCCÈS</span>'
          : '<span class="ko">❌ ÉCHEC</span>';

        resultat.innerHTML = etat + ' (HTTP ' + reponse.status + ')\n\n'
          + JSON.stringify(data, null, 2);

      } catch (err) {
        resultat.innerHTML = '<span class="ko">❌ ERREUR</span>\n\n' + err.message;
      }
    });
  </script>
</body>
</html>
