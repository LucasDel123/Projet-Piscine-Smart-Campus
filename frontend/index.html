<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCampus</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:#15233F; --ink-soft:#3B4660; --primary:#2E5BD7; --primary-d:#1E40AF; --primary-l:#9DBDF5;
      --accent:#00A3E0; --bg:#E9ECF2; --surface:#ffffff; --line:#E9EDF4; --text:#1B2540; --muted:#8A93A6;
      --danger:#E2231A; --radius:18px; --shadow:0 1px 2px rgba(20,30,60,.04),0 12px 32px rgba(20,30,60,.07);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Plus Jakarta Sans",sans-serif; background:var(--bg); color:var(--text); padding:16px; -webkit-font-smoothing:antialiased; }
    h1,h2,h3,h4 { font-family:"Plus Jakarta Sans",sans-serif; margin:0; letter-spacing:-.015em; }
    button { font-family:inherit; cursor:pointer; }
    input,select { font-family:inherit; }

    .login-wrap { min-height:calc(100vh - 32px); display:grid; place-items:center; padding:24px; border-radius:26px;
      background:radial-gradient(900px 500px at 85% -10%, rgba(46,91,215,.30), transparent 60%),
                 radial-gradient(700px 500px at -10% 110%, rgba(0,163,224,.22), transparent 55%), var(--ink); }
    .login-card { width:100%; max-width:420px; background:var(--surface); border-radius:24px; padding:42px 38px;
      box-shadow:0 30px 70px rgba(0,0,0,.3); animation:rise .6s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes rise { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:none;} }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom:26px; }
    .brand-logo { width:44px; height:44px; border-radius:14px; display:grid; place-items:center;
      background:linear-gradient(135deg,var(--primary),var(--primary-d)); color:#fff; font-family:"Sora"; font-weight:800; font-size:20px; box-shadow:0 8px 18px rgba(46,91,215,.45); }
    .brand-name { font-family:"Sora"; font-weight:800; font-size:20px; color:var(--ink); }
    .brand-name span { color:var(--primary); }
    .login-card h2 { font-size:1.1rem; color:var(--ink); }
    .login-card p.hint { color:var(--muted); font-size:.85rem; margin:4px 0 22px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:.8rem; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
    .field input, .field select { width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:12px; font-size:.95rem; transition:border-color .15s,box-shadow .15s; background:#F7F9FC; }
    .field input:focus, .field select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 4px rgba(46,91,215,.14); background:#fff; }
    .btn-primary { width:100%; padding:13px; border:none; border-radius:999px; color:#fff; font-weight:700; font-size:.97rem;
      background:linear-gradient(135deg,var(--primary),var(--primary-d)); box-shadow:0 10px 22px rgba(46,91,215,.35); transition:transform .12s,box-shadow .12s; }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 14px 28px rgba(46,91,215,.45); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .alert { padding:10px 13px; border-radius:12px; font-size:.85rem; margin-bottom:16px; }
    .alert-err { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .test-note { margin-top:20px; padding-top:16px; border-top:1px solid var(--line); font-size:.76rem; color:var(--muted); line-height:1.6; }

    .shell { display:flex; gap:16px; min-height:calc(100vh - 32px); align-items:flex-start; }
    .sidebar { width:252px; flex-shrink:0; background:var(--surface); color:var(--text); display:flex; flex-direction:column; padding:22px 16px; border-radius:22px; box-shadow:var(--shadow); position:sticky; top:16px; height:calc(100vh - 32px); }
    .sidebar .brand { margin:6px 8px 24px; }
    .sidebar .brand-name { color:var(--ink); }
    .nav-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin:14px 12px 6px; font-weight:700; }
    .nav-item { display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:11px 14px; border:none; background:transparent; color:var(--ink-soft); border-radius:12px; font-size:.92rem; font-weight:500; margin-bottom:3px; transition:all .14s; }
    .nav-item:hover { background:#F1F4FA; color:var(--ink); }
    .nav-item.active { background:rgba(46,91,215,.10); color:var(--primary-d); font-weight:700; }
    .nav-item .ico { font-size:1.05rem; width:20px; text-align:center; }
    .sidebar-foot { margin-top:auto; font-size:.72rem; color:var(--muted); padding:12px; }

    .main { flex:1; display:flex; flex-direction:column; gap:16px; min-width:0; }
    .topbar { background:var(--surface); border-radius:22px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; padding:16px 26px; position:sticky; top:16px; z-index:5; }
    .topbar h1 { font-size:1.2rem; color:var(--ink); }
    .user-chip { display:flex; align-items:center; gap:13px; }
    .avatar { width:42px; height:42px; border-radius:50%; display:grid; place-items:center; background:linear-gradient(135deg,var(--primary-l),var(--primary)); color:#fff; font-family:"Sora"; font-weight:700; font-size:.9rem; }
    .user-meta { text-align:right; line-height:1.25; }
    .user-meta .nm { font-weight:700; font-size:.9rem; color:var(--ink); }
    .badge { font-size:.68rem; padding:3px 10px; border-radius:999px; font-weight:700; background:rgba(46,91,215,.12); color:var(--primary-d); }
    .badge.admin { background:rgba(0,163,224,.14); color:#0369a1; }
    .btn-ghost { border:1.5px solid var(--line); background:#fff; color:var(--ink-soft); padding:9px 16px; border-radius:999px; font-size:.85rem; font-weight:600; transition:all .14s; }
    .btn-ghost:hover { border-color:#cbd5e1; background:#f8fafc; }

    .content { flex:1; animation:fade .35s ease both; }
    @keyframes fade { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }

    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:16px; }
    .stat { background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:22px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
    .stat::after { content:""; position:absolute; right:-24px; top:-24px; width:96px; height:96px; border-radius:50%; background:rgba(46,91,215,.08); }
    .stat .lab { font-size:.82rem; color:var(--muted); margin-bottom:8px; }
    .stat .val { font-family:"Sora"; font-weight:800; font-size:2.1rem; color:var(--ink); }
    .stat .ico { font-size:1.3rem; margin-bottom:10px; display:block; }

    .panel { background:var(--surface); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); overflow:hidden; }
    .panel-head { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
    .panel-head h3 { font-size:1.05rem; color:var(--ink); }
    .panel-head .sub { font-size:.82rem; color:var(--muted); margin-top:2px; }
    .toolbar { display:flex; gap:10px; align-items:center; }
    .search { padding:10px 14px; border:1.5px solid var(--line); border-radius:999px; font-size:.88rem; width:240px; background:#F7F9FC; }
    .search:focus { outline:none; border-color:var(--primary); background:#fff; }
    .btn-add { background:linear-gradient(135deg,var(--primary),var(--primary-d)); color:#fff; border:none; padding:10px 18px; border-radius:999px; font-size:.88rem; font-weight:700; white-space:nowrap; box-shadow:0 8px 18px rgba(46,91,215,.30); }

    table { width:100%; border-collapse:collapse; }
    thead th { text-align:left; font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); padding:14px 24px; background:#F7F9FC; border-bottom:1px solid var(--line); }
    tbody td { padding:15px 24px; border-bottom:1px solid #F1F4F9; font-size:.9rem; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover { background:#F7FAFF; }
    .pill { font-size:.74rem; padding:4px 11px; border-radius:999px; background:#EEF2F8; color:#5B6678; font-weight:600; }
    .tag-ok { font-size:.74rem; padding:4px 11px; border-radius:999px; background:rgba(46,91,215,.12); color:var(--primary-d); font-weight:700; }
    .tag-wait { font-size:.74rem; padding:4px 11px; border-radius:999px; background:rgba(245,158,11,.16); color:#b45309; font-weight:700; }
    .row-actions { display:flex; gap:8px; }
    .ic-btn { border:none; background:#F1F4FA; width:34px; height:34px; border-radius:10px; font-size:.85rem; transition:all .14s; }
    .ic-btn:hover { background:#E3E9F3; }
    .ic-btn.del:hover { background:#fee2e2; }
    .empty { padding:54px; text-align:center; color:var(--muted); font-size:.9rem; }

    .overlay { position:fixed; inset:0; background:rgba(15,23,42,.5); backdrop-filter:blur(2px); display:grid; place-items:center; z-index:50; padding:20px; animation:fade .2s; }
    .modal { background:#fff; border-radius:22px; width:100%; max-width:480px; box-shadow:0 30px 70px rgba(0,0,0,.3); animation:rise .3s both; }
    .modal-head { padding:22px 26px; border-bottom:1px solid var(--line); }
    .modal-head h3 { font-size:1.05rem; color:var(--ink); }
    .modal-body { padding:24px 26px; max-height:70vh; overflow:auto; }
    .modal-body .field { margin-bottom:14px; }
    .modal-foot { padding:18px 26px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:13px 24px; border-radius:999px; color:#fff; font-size:.88rem; font-weight:600; box-shadow:0 14px 34px rgba(0,0,0,.25); z-index:80; animation:rise .3s; max-width:90%; }
    .toast.ok { background:linear-gradient(135deg,var(--primary),var(--primary-d)); }
    .toast.err { background:var(--danger); }

    .spinner-wrap { min-height:calc(100vh - 32px); display:grid; place-items:center; background:var(--surface); border-radius:26px; }
    .spinner { width:40px; height:40px; border:3px solid #DCE3EF; border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:820px) { .sidebar { display:none; } .form-grid { grid-template-columns:1fr; } .search { width:160px; } body { padding:8px; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API = '/smartcampus/backend/';

    async function apiCall(path, { method='GET', body } = {}) {
      const opts = { method, headers:{} };
      if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
      const res = await fetch(API + path, opts);
      let data = {};
      try { data = await res.json(); } catch(e) { data = { success:false, message:'Réponse invalide du serveur.' }; }
      return { status:res.status, ...data };
    }

    const ROLE_LABEL = { administrateur:'Administrateur', enseignant:'Enseignant', etudiant:'Étudiant' };
    const initiales = (u) => ((u.prenom?.[0]||'')+(u.nom?.[0]||'')).toUpperCase();

    function Login({ onLogin }) {
      const [email,setEmail]=useState('lucas.delliste@edu.ece.fr');
      const [mdp,setMdp]=useState('mateolpb');
      const [err,setErr]=useState(''); const [busy,setBusy]=useState(false);
      const submit=async()=>{ setErr(''); setBusy(true);
        const r=await apiCall('api/auth/login.php',{method:'POST',body:{email,mot_de_passe:mdp}});
        setBusy(false); if(r.success) onLogin(r.data); else setErr(r.message||'Connexion impossible.'); };
      return (
        <div className="login-wrap"><div className="login-card">
          <div className="brand"><div className="brand-logo">S</div><div className="brand-name">Smart<span>Campus</span></div></div>
          <h2>Connexion à votre espace</h2>
          <p className="hint">Gestion académique — accédez à votre tableau de bord.</p>
          {err && <div className="alert alert-err">{err}</div>}
          <div className="field"><label>Adresse email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} /></div>
          <div className="field"><label>Mot de passe</label>
            <input type="password" value={mdp} onChange={e=>setMdp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} /></div>
          <button className="btn-primary" onClick={submit} disabled={busy}>{busy?'Connexion…':'Se connecter'}</button>
          <div className="test-note">💡 Compte de démo : <b>lucas.delliste@edu.ece.fr</b> (admin) — mot de passe <b>mateolpb</b>.</div>
        </div></div>
      );
    }

    function Dashboard({ user }) {
      const [nb,setNb]=useState({etu:null,ens:null,cours:null,insc:null,notes:null,seances:null});
      useEffect(()=>{ if(user.role==='administrateur'){
        apiCall('api/etudiants/list.php').then(r=>{ if(r.success) setNb(s=>({...s,etu:r.data.length})); });
        apiCall('api/enseignants/list.php').then(r=>{ if(r.success) setNb(s=>({...s,ens:r.data.length})); });
        apiCall('api/cours/list.php').then(r=>{ if(r.success) setNb(s=>({...s,cours:r.data.length})); });
        apiCall('api/inscriptions/list.php').then(r=>{ if(r.success) setNb(s=>({...s,insc:r.data.length})); });
        apiCall('api/notes/list.php').then(r=>{ if(r.success) setNb(s=>({...s,notes:r.data.length})); });
        apiCall('api/seances/list.php').then(r=>{ if(r.success) setNb(s=>({...s,seances:r.data.length})); });
      }},[]);
      return (
        <div>
          <h2 style={{fontSize:'1.4rem',color:'var(--ink)',marginBottom:6}}>Bonjour {user.prenom} 👋</h2>
          <p style={{color:'var(--muted)',marginBottom:26}}>Bienvenue sur votre espace {ROLE_LABEL[user.role]?.toLowerCase()}.</p>
          {user.role==='administrateur' && (
            <div className="stat-grid">
              <div className="stat"><span className="ico">👥</span><div className="lab">Étudiants</div><div className="val">{nb.etu===null?'…':nb.etu}</div></div>
              <div className="stat"><span className="ico">🎓</span><div className="lab">Enseignants</div><div className="val">{nb.ens===null?'…':nb.ens}</div></div>
              <div className="stat"><span className="ico">📚</span><div className="lab">Cours</div><div className="val">{nb.cours===null?'…':nb.cours}</div></div>
              <div className="stat"><span className="ico">📝</span><div className="lab">Inscriptions</div><div className="val">{nb.insc===null?'…':nb.insc}</div></div>
              <div className="stat"><span className="ico">🏆</span><div className="lab">Notes saisies</div><div className="val">{nb.notes===null?'…':nb.notes}</div></div>
              <div className="stat"><span className="ico">📅</span><div className="lab">Séances</div><div className="val">{nb.seances===null?'…':nb.seances}</div></div>
            </div>
          )}
          <div className="panel">
            <div className="panel-head"><div><h3>Activité</h3><div className="sub">Vue d'ensemble de votre compte</div></div></div>
            <div style={{padding:'22px'}}>
              <p style={{color:'var(--muted)',fontSize:'.92rem',lineHeight:1.7,margin:0}}>
                Vous êtes connecté en tant que <b style={{color:'var(--ink)'}}>{user.prenom} {user.nom}</b> ({user.email}).
                {user.role==='administrateur' ? ' Utilisez le menu de gauche pour gérer toute la plateforme académique.' : ' D\'autres modules seront accessibles selon votre rôle.'}
              </p>
            </div>
          </div>
        </div>
      );
    }

    function CrudTable({ config, notify, selectOptions={}, onChanged }) {
      const [liste,setListe]=useState([]); const [loading,setLoading]=useState(true);
      const [q,setQ]=useState(''); const [modal,setModal]=useState(null);
      const charger=useCallback(async()=>{ setLoading(true);
        const r=await apiCall(config.api+'list.php'); setLoading(false);
        if(r.success) setListe(r.data); else notify(r.message,false);
      },[config.api]);
      useEffect(()=>{ charger(); },[config.api]);
      const labelOf=(it)=> config.itemLabel ? config.itemLabel(it) : `${it.prenom||''} ${it.nom||''}`;
      const supprimer=async(item)=>{
        if(!confirm(`${config.deleteVerb||'Supprimer'} « ${labelOf(item)} » ?`)) return;
        const r=await apiCall(config.api+'delete.php',{method:'POST',body:{[config.idKey]:item[config.idKey]}});
        notify(r.message,r.success); if(r.success){ charger(); onChanged&&onChanged(); }
      };
      const doAction=async(a,item)=>{
        const c = a.confirm ? a.confirm(item) : null;
        if(c && !confirm(c)) return;
        const r=await apiCall(config.api+a.endpoint,{method:'POST',body:a.body(item)});
        notify(r.message,r.success); if(r.success){ charger(); onChanged&&onChanged(); }
      };
      const filtres=liste.filter(it=>{ const t=config.columns.map(c=>it[c.key]||'').join(' ').toLowerCase(); return t.includes(q.toLowerCase()); });
      const renderCell=(c,it)=>{
        if(c.render) return c.render(it);
        if(c.pill) return <span className="pill">{it[c.key]||'—'}</span>;
        return (it[c.key]!=null&&it[c.key]!==''?it[c.key]:'—');
      };
      return (
        <div>
          <div className="panel">
            <div className="panel-head">
              <div><h3>{config.titre}</h3><div className="sub">{liste.length} {config.unite} au total</div></div>
              <div className="toolbar">
                <input className="search" placeholder="Rechercher…" value={q} onChange={e=>setQ(e.target.value)} />
                <button className="btn-add" onClick={()=>setModal({mode:'create'})}>+ {config.addLabel||'Ajouter'}</button>
              </div>
            </div>
            {loading ? <div className="empty">Chargement…</div>
              : filtres.length===0 ? <div className="empty">Aucun résultat.</div>
              : (
                <table>
                  <thead><tr>{config.columns.map(c=><th key={c.key}>{c.label}</th>)}<th></th></tr></thead>
                  <tbody>
                    {filtres.map(it=>(
                      <tr key={it[config.idKey]}>
                        {config.columns.map(c=>(<td key={c.key} style={c.style||{}}>{renderCell(c,it)}</td>))}
                        <td><div className="row-actions">
                          {config.extraActions && config.extraActions.map(a=>(
                            (!a.show || a.show(it)) ? <button key={a.icon} className="ic-btn" title={a.title} onClick={()=>doAction(a,it)}>{a.icon}</button> : null
                          ))}
                          {!config.noEdit && (!config.canEdit || config.canEdit(it)) && <button className="ic-btn" title="Modifier" onClick={()=>setModal({mode:'edit',item:it})}>✏️</button>}
                          {(!config.canDelete || config.canDelete(it)) && <button className="ic-btn del" title={config.deleteVerb||'Supprimer'} onClick={()=>supprimer(it)}>🗑️</button>}
                        </div></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
          </div>
          {modal && <CrudModal config={config} modal={modal} notify={notify} selectOptions={selectOptions}
            onClose={()=>setModal(null)} onSaved={()=>{ setModal(null); charger(); onChanged&&onChanged(); }} />}
        </div>
      );
    }

    function CrudModal({ config, modal, onClose, onSaved, notify, selectOptions={} }) {
      const edit=modal.mode==='edit'; const i0=modal.item||{};
      const visible=config.fields.filter(x=> !(edit && x.createOnly));
      const init={}; visible.forEach(f=>{ init[f.key]= (i0[f.key]!=null ? String(i0[f.key]) : ''); });
      const [f,setF]=useState(init); const [busy,setBusy]=useState(false);
      const set=(k,v)=>setF(s=>({...s,[k]:v}));
      const submit=async()=>{ setBusy(true);
        const path=config.api+(edit?'update.php':'create.php');
        const body=edit?{...f,[config.idKey]:i0[config.idKey]}:f;
        const r=await apiCall(path,{method:'POST',body}); setBusy(false);
        notify(r.message,r.success); if(r.success) onSaved();
      };
      const renderField=(x)=>(
        <div className="field" key={x.key}>
          <label>{x.label}</label>
          {x.type==='select'
            ? <select value={f[x.key]} onChange={e=>set(x.key,e.target.value)}>
                {(selectOptions[x.key]||[]).map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            : <input type={x.type||'text'} value={f[x.key]} onChange={e=>set(x.key,e.target.value)} placeholder={x.ph||''} />}
        </div>
      );
      const halves=visible.filter(x=>x.half);
      const fulls=visible.filter(x=>!x.half);
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><h3>{edit?config.editTitle:config.createTitle}</h3></div>
            <div className="modal-body">
              {fulls.filter(x=>x.first).map(renderField)}
              <div className="form-grid">{halves.map(renderField)}</div>
              {fulls.filter(x=>!x.first).map(renderField)}
              {!edit && config.passwordNote && <p style={{fontSize:'.78rem',color:'var(--muted)',margin:'2px 0 0'}}>Mot de passe par défaut : <b>smartcampus</b>.</p>}
            </div>
            <div className="modal-foot">
              <button className="btn-ghost" onClick={onClose}>Annuler</button>
              <button className="btn-add" onClick={submit} disabled={busy}>{busy?'Enregistrement…':(edit?'Enregistrer':(config.addLabel||'Ajouter'))}</button>
            </div>
          </div>
        </div>

    }

    function EtuEDT({ user }) {
      const [seances,setSeances]=useState([]); const [loading,setLoading]=useState(true);
      useEffect(()=>{
        Promise.all([apiCall('api/inscriptions/list.php'), apiCall('api/seances/list.php')]).then(([ri,rs])=>{
          setLoading(false);
          if(ri.success && rs.success){
            const mesCours=new Set(ri.data.filter(i=>String(i.id_etudiant)===String(user.id)).map(i=>String(i.id_cours)));
            setSeances(rs.data.filter(s=>mesCours.has(String(s.id_cours))));
          }
        });
      },[]);
      return (
        <div>
          <h3 style={{fontSize:'1.05rem',color:'var(--ink)',marginBottom:14}}>📅 Mon emploi du temps</h3>
          {loading ? <div className="empty">Chargement…</div> : <AgendaJours seances={seances} />}
        </div>
      );
    }

    function ProfDashboard({ user }) {
      const [nb,setNb]=useState({cours:null,etudiants:null,notes:null});
      useEffect(()=>{
        apiCall('api/cours/list.php').then(r=>{ if(r.success){
          const mes=r.data.filter(c=>String(c.id_enseignant)===String(user.id));
          const ids=new Set(mes.map(c=>String(c.id_cours)));
          const codes=new Set(mes.map(c=>c.code_cours));
          setNb(s=>({...s,cours:mes.length}));
          apiCall('api/inscriptions/list.php').then(ri=>{ if(ri.success){
            const etu=new Set(ri.data.filter(i=>ids.has(String(i.id_cours))).map(i=>String(i.id_etudiant)));
            setNb(s=>({...s,etudiants:etu.size}));
          }});
          apiCall('api/notes/list.php').then(rn=>{ if(rn.success) setNb(s=>({...s,notes:rn.data.filter(n=>codes.has(n.code_cours)).length})); });
        }});
      },[]);
      return (
        <div>
          <h2 style={{fontSize:'1.4rem',color:'var(--ink)',marginBottom:6}}>Bonjour {user.prenom} 👋</h2>
          <p style={{color:'var(--muted)',marginBottom:26}}>Bienvenue sur votre espace enseignant.</p>
          <div className="stat-grid">
            <div className="stat"><span className="ico">📚</span><div className="lab">Mes cours</div><div className="val">{nb.cours===null?'…':nb.cours}</div></div>
            <div className="stat"><span className="ico">👥</span><div className="lab">Mes étudiants</div><div className="val">{nb.etudiants===null?'…':nb.etudiants}</div></div>
            <div className="stat"><span className="ico">🏆</span><div className="lab">Notes saisies</div><div className="val">{nb.notes===null?'…':nb.notes}</div></div>
          </div>
        </div>
      );
    }

    function ProfCours({ user }) {
      const [cours,setCours]=useState([]); const [loading,setLoading]=useState(true);
      useEffect(()=>{ apiCall('api/cours/list.php').then(r=>{ setLoading(false); if(r.success) setCours(r.data.filter(c=>String(c.id_enseignant)===String(user.id))); }); },[]);
      return (
        <div className="panel">
          <div className="panel-head"><div><h3>Mes cours</h3><div className="sub">{cours.length} cours enseigné(s)</div></div></div>
          {loading ? <div className="empty">Chargement…</div>
            : cours.length===0 ? <div className="empty">Aucun cours ne vous est attribué.</div>
            : <table><thead><tr><th>Code</th><th>Intitulé</th><th>Semestre</th><th>Remplissage</th><th>Crédits</th></tr></thead>
                <tbody>{cours.map(c=>(<tr key={c.id_cours}><td><span className="pill">{c.code_cours}</span></td><td style={{fontWeight:500}}>{c.intitule}</td><td>{c.semestre}</td><td>{c.remplissage}</td><td>{c.credits}</td></tr>))}</tbody>
              </table>}
        </div>
      );
    }

    function ProfNoteModal({ modal, notify, onClose, onSaved }) {
      const [type,setType]=useState('CC1'); const [valeur,setValeur]=useState(''); const [coef,setCoef]=useState('1'); const [busy,setBusy]=useState(false);
      const submit=async()=>{ setBusy(true);
        const r=await apiCall('api/notes/create.php',{method:'POST',body:{id_inscription:modal.id_inscription, type_evaluation:type, valeur:Number(valeur), coefficient:Number(coef)}});
        setBusy(false); notify(r.message,r.success); if(r.success) onSaved();
      };
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><h3>Nouvelle note — {modal.etudiant}</h3></div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="field"><label>Type</label>
                  <select value={type} onChange={e=>setType(e.target.value)}>{['CC1','CC2','DS','Examen','Projet'].map(t=><option key={t} value={t}>{t}</option>)}</select></div>
                <div className="field"><label>Note (0-20)</label><input type="number" min="0" max="20" step="0.5" value={valeur} onChange={e=>setValeur(e.target.value)} /></div>
              </div>
              <div className="field"><label>Coefficient</label><input type="number" min="0" step="0.1" value={coef} onChange={e=>setCoef(e.target.value)} /></div>
            </div>
            <div className="modal-foot">
              <button className="btn-ghost" onClick={onClose}>Annuler</button>
              <button className="btn-add" onClick={submit} disabled={busy}>{busy?'Enregistrement…':'Enregistrer'}</button>
            </div>
          </div>
        </div>
      );
    }

    function ProfNotes({ user, notify }) {
      const [cours,setCours]=useState([]); const [sel,setSel]=useState('');
      const [inscrits,setInscrits]=useState([]); const [notes,setNotes]=useState([]); const [modal,setModal]=useState(null);
      useEffect(()=>{ apiCall('api/cours/list.php').then(r=>{ if(r.success) setCours(r.data.filter(c=>String(c.id_enseignant)===String(user.id))); }); },[]);
      const charger=useCallback(()=>{
        if(!sel){ setInscrits([]); setNotes([]); return; }
        apiCall('api/inscriptions/list.php').then(r=>{ if(r.success) setInscrits(r.data.filter(i=>String(i.id_cours)===String(sel))); });
        apiCall('api/notes/list.php').then(r=>{ if(r.success) setNotes(r.data); });
      },[sel]);
      useEffect(()=>{ charger(); },[sel]);
      const notesDe=(id)=> notes.filter(n=>String(n.id_inscription)===String(id));
      const valider=async(id)=>{ if(!confirm('Valider cette note ? Elle sera verrouillée.'))return; const r=await apiCall('api/notes/validate.php',{method:'POST',body:{id_note:id}}); notify(r.message,r.success); if(r.success) charger(); };
      const supprimer=async(id)=>{ if(!confirm('Supprimer cette note ?'))return; const r=await apiCall('api/notes/delete.php',{method:'POST',body:{id_note:id}}); notify(r.message,r.success); if(r.success) charger(); };
      return (
        <div>
          <div className="panel">
            <div className="panel-head">
              <div><h3>Saisie des notes</h3><div className="sub">Sélectionnez un de vos cours</div></div>
              <div className="toolbar">
                <select className="search" style={{width:300}} value={sel} onChange={e=>setSel(e.target.value)}>
                  <option value="">— Choisir un cours —</option>
                  {cours.map(c=><option key={c.id_cours} value={String(c.id_cours)}>{c.code_cours} — {c.intitule}</option>)}
                </select>
              </div>
            </div>
            {!sel ? <div className="empty">Choisissez un cours pour saisir des notes.</div>
              : inscrits.length===0 ? <div className="empty">Aucun étudiant inscrit à ce cours.</div>
              : <table>
                  <thead><tr><th>Étudiant</th><th>Notes</th><th></th></tr></thead>
                  <tbody>
                    {inscrits.map(i=>(
                      <tr key={i.id_inscription}>
                        <td style={{fontWeight:500}}>{i.etudiant}</td>
                        <td>
                          <div style={{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center'}}>
                            {notesDe(i.id_inscription).length===0 ? <span style={{color:'var(--muted)',fontSize:'.85rem'}}>—</span>
                              : notesDe(i.id_inscription).map(n=>(
                                <span key={n.id_note} className={Number(n.validee)===1?'tag-ok':'tag-wait'} style={{display:'inline-flex',alignItems:'center',gap:5}}>
                                  {n.type_evaluation} {n.valeur}/20
                                  {Number(n.validee)!==1 && <button className="ic-btn" title="Valider" style={{width:22,height:22,fontSize:'.7rem'}} onClick={()=>valider(n.id_note)}>🔒</button>}
                                  {Number(n.validee)!==1 && <button className="ic-btn del" title="Supprimer" style={{width:22,height:22,fontSize:'.7rem'}} onClick={()=>supprimer(n.id_note)}>🗑️</button>}
                                </span>
                              ))}
                          </div>
                        </td>
                        <td><button className="btn-add" style={{padding:'6px 12px',fontSize:'.82rem'}} onClick={()=>setModal({id_inscription:i.id_inscription, etudiant:i.etudiant})}>+ Note</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>}
          </div>
          {modal && <ProfNoteModal modal={modal} notify={notify} onClose={()=>setModal(null)} onSaved={()=>{ setModal(null); charger(); }} />}
        </div>
      );
    }

    function ProfEDT({ user }) {
      const [seances,setSeances]=useState([]); const [loading,setLoading]=useState(true);
      useEffect(()=>{
        Promise.all([apiCall('api/cours/list.php'), apiCall('api/seances/list.php')]).then(([rc,rs])=>{
          setLoading(false);
          if(rc.success && rs.success){
            const mesCours=new Set(rc.data.filter(c=>String(c.id_enseignant)===String(user.id)).map(c=>String(c.id_cours)));
            setSeances(rs.data.filter(s=>mesCours.has(String(s.id_cours))));
          }
        });
      },[]);
      return (
        <div>
          <h3 style={{fontSize:'1.05rem',color:'var(--ink)',marginBottom:14}}>📅 Mon emploi du temps</h3>
          {loading ? <div className="empty">Chargement…</div> : <AgendaJours seances={seances} />}
        </div>
      );
    }

    const MENUS = {
      administrateur: [
        {key:'dashboard', icon:'📊', label:'Tableau de bord', render:(p)=><Dashboard user={p.user} />},
        {key:'etudiants', icon:'👥', label:'Étudiants', render:(p)=><CrudTable config={CONF_ETU} notify={p.notify} />},
        {key:'enseignants', icon:'🎓', label:'Enseignants', render:(p)=><CrudTable config={CONF_ENS} notify={p.notify} />},
        {key:'cours', icon:'📚', label:'Cours', render:(p)=><CoursView notify={p.notify} />},
        {key:'inscriptions', icon:'📝', label:'Inscriptions', render:(p)=><InscriptionsView notify={p.notify} />},
        {key:'notes', icon:'🏆', label:'Notes', render:(p)=><NotesView notify={p.notify} />},
        {key:'edt', icon:'📅', label:'Emploi du temps', render:(p)=><EmploiDuTempsView notify={p.notify} />},
        {key:'bulletins', icon:'📄', label:'Bulletins', render:(p)=><BulletinView notify={p.notify} />},
      ],
      enseignant: [
        {key:'dashboard', icon:'📊', label:'Tableau de bord', render:(p)=><ProfDashboard user={p.user} />},
        {key:'mescours', icon:'📚', label:'Mes cours', render:(p)=><ProfCours user={p.user} />},
        {key:'saisie', icon:'🏆', label:'Saisie des notes', render:(p)=><ProfNotes user={p.user} notify={p.notify} />},
        {key:'edt', icon:'📅', label:'Mon emploi du temps', render:(p)=><ProfEDT user={p.user} />},
      ],
      etudiant: [
        {key:'dashboard', icon:'📊', label:'Tableau de bord', render:(p)=><EtuDashboard user={p.user} />},
        {key:'mescours', icon:'📚', label:'Mes cours', render:(p)=><EtuCours user={p.user} />},
        {key:'bulletin', icon:'📄', label:'Mon bulletin', render:(p)=><EtuBulletin user={p.user} />},
        {key:'edt', icon:'📅', label:'Mon emploi du temps', render:(p)=><EtuEDT user={p.user} />},
      ],
    };

    function Shell({ user, onLogout, menu }) {
      const [view,setView]=useState(menu[0].key); const [toast,setToast]=useState(null);
      const notify=(msg,ok)=>{ setToast({msg,ok}); setTimeout(()=>setToast(null),3500); };
      const logout=async()=>{ await apiCall('api/auth/logout.php',{method:'POST'}); onLogout(); };
      const isAdmin=user.role==='administrateur';
      const current=menu.find(m=>m.key===view)||menu[0];
      return (
        <div className="shell">
          <aside className="sidebar">
            <div className="brand"><div className="brand-logo">S</div><div className="brand-name">Smart<span style={{color:'var(--primary-l)'}}>Campus</span></div></div>
            <div className="nav-label">Navigation</div>
            {menu.map(m=>(
              <button key={m.key} className={'nav-item'+(view===m.key?' active':'')} onClick={()=>setView(m.key)}><span className="ico">{m.icon}</span> {m.label}</button>
            ))}
            <div className="sidebar-foot">SmartCampus · 2026<br/>Projet Web dynamique — ECE</div>
          </aside>
          <div className="main">
            <header className="topbar">
              <h1>{current.label}</h1>
              <div className="user-chip">
                <div className="user-meta"><div className="nm">{user.prenom} {user.nom}</div><span className={'badge'+(isAdmin?' admin':'')}>{ROLE_LABEL[user.role]}</span></div>
                <div className="avatar">{initiales(user)}</div>
                <button className="btn-ghost" onClick={logout}>Déconnexion</button>
              </div>
            </header>
            <main className="content" key={view}>
              {current.render({ user, notify })}
            </main>
          </div>
          {toast && <div className={'toast '+(toast.ok?'ok':'err')}>{toast.ok?'✅':'⚠️'} {toast.msg}</div>}
        </div>
      );
    }

    function App() {
      const [user,setUser]=useState(null); const [loading,setLoading]=useState(true);
      useEffect(()=>{ apiCall('api/auth/me.php').then(r=>{ if(r.success) setUser(r.data); setLoading(false); }); },[]);
      if(loading) return <div className="spinner-wrap"><div className="spinner"></div></div>;
      if(!user) return <Login onLogin={setUser} />;
      const menu = MENUS[user.role] || MENUS.etudiant;
      return <Shell user={user} onLogout={()=>setUser(null)} menu={menu} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
